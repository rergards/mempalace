items:
  - key: BACKUP-AUTOMATED-RETENTION-DEFAULTS
    summary: Bound scheduled backup retention by default
    type: task
    status: open
    priority: high
    size: M
    section_id: storage_reliability
    description: |
      ## Scope

      Local and remote disk incidents showed that automated backups can still
      retain oversized archives even after pre_optimize retention is bounded.
      The remaining product-level gap is scheduled backup retention: fresh
      installs still treat scheduled archives as unbounded unless
      backup_retain_count is explicitly configured.

      Add a bounded implicit default for managed scheduled backups while
      preserving manual backup safety and explicit keep-all semantics.

      Do:
      - Add kind-aware scheduled retention, proposed default: newest 14 managed
        scheduled archives.
      - Keep pre_optimize implicit retention at newest 5.
      - Keep manual backups unbounded by default.
      - Keep explicit backup_retain_count and MEMPALACE_BACKUP_RETAIN_COUNT
        semantics: nonzero overrides all kinds; explicit 0 is deliberate
        keep-all.
      - Keep explicit --out archives outside managed retention.
      - Update README.md, docs/BACKUP_RESTORE.md, and docs/AGENT_INSTALL.md so
        scheduled backups are no longer documented as unbounded by default.

      Out of scope:
      - Pruning manual user-created backups by default.
      - Deleting existing backups during install/init.
      - Age-based or disk-quota retention.

      ## Acceptance criteria

      - Fresh config resolves scheduled retention to the bounded default,
        pre_optimize retention to 5, and manual retention to 0.
      - Explicit backup_retain_count: 0 keeps all backup kinds.
      - Explicit nonzero backup_retain_count still overrides scheduled,
        pre_optimize, and manual retention.
      - Repeated managed `backup create --kind scheduled` calls prune old
        scheduled_*.tar.gz archives to the default bound.
      - Disk-budget refusal happens before writing a new archive or pruning old
        scheduled archives.
      - Generated `backup schedule` snippets remain managed-retention-safe and
        do not use explicit --out.
